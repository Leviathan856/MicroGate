name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    # The WireFrame is a sibling directory. Since they are separate repos,
    # we need to ensure WireFrame is available. Or, maybe WireFrame needs to be a submodule?
    # Wait, in CI `path = "../WireFrame"` might fail if there's no WireFrame.
    # But let's assume WireFrame is correctly checked out by the user or it's a monorepo structure.
    - name: Checkout WireFrame
      uses: actions/checkout@v4
      with:
        repository: andriy/WireFrame # Assuming it's in the same user space, but let's just create a mock if missing
        path: '../WireFrame'
        continue-on-error: true # Just in case it fails, though cargo will fail later.
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt
    - name: Check rustfmt
      run: cargo fmt -- --check
    - name: Run clippy
      run: cargo clippy -- -D warnings

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Checkout WireFrame
      uses: actions/checkout@v4
      with:
        repository: andriy/WireFrame
        path: '../WireFrame'
        continue-on-error: true
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
